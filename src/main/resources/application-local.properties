# app
app.allow.origins=http://localhost:*
#id system
id-system.base-url=https://id.ezisolutions.tech/api/v1/private/
id-system.token=${APP_PRIVATE_TOKEN:}
# redis
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}
# postgresql
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/hackathon}
spring.datasource.username=${POSTGRES_USERNAME:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
# Kafka broker address
spring.kafka.bootstrap-servers=localhost:19092,localhost:29092
# Chroma Vector Store
spring.ai.vectorstore.chroma.client.host=${CHROMA_HOST:http://db.ezisolutions.tech}
spring.ai.vectorstore.chroma.client.port=${CHROMA_PORT:8088}
spring.ai.vectorstore.chroma.client.username=${CHROMA_USERNAME:admin}
spring.ai.vectorstore.chroma.client.password=${CHROMA_PASSWORD:}
# embedding
spring.ai.google.genai.embedding.api-key=${GOOGLE_AI_EMBEDDING_API_KEY:}
# rest client configuration
rest-client.base-url=http://localhost:8080
rest-client.token=${REST_CLIENT_TOKEN:}
rest-client.connect-timeout=10
rest-client.read-timeout=30
rest-client.max-retries=3
rest-client.retry-delay=2
# dbdiagram configuration
dbdiagram.base-url=https://api.dbdiagram.io/v1
dbdiagram.token=${DBDIAGRAM_TOKEN:}
# bitbucket cloud configuration
bitbucket.base-url=https://api.bitbucket.org/2.0
bitbucket.username=${BITBUCKET_USERNAME:}
bitbucket.token=${BITBUCKET_TOKEN:}
## S3 Storage
s3-client.access-key-id=${S3_ACCESS_KEY_ID:}
s3-client.secret-access-key=${S3_SECRET_ACCESS_KEY:}
s3-client.region=us-east-1
s3-client.endpoint=http://minio.ezisolutions.vn:9099
s3-client.public-url=https://minio.ezisolutions.vn/storage
s3-client.bucket=storage
