# app
app.allow.origins=http://localhost:*
#id system
id-system.base-url=https://id.ezisolutions.tech/api/v1/private/
id-system.token=${APP_PRIVATE_TOKEN:}
# redis
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}
# postgresql
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/hackathon}
spring.datasource.username=${POSTGRES_USERNAME:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
# dbdiagram configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
# Kafka is optional for OrderFlow MVP local runs.
kafka.enabled=${KAFKA_ENABLED:false}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
orderflow.security.jwt-secret=${APP_JWT_SECRET:change-me-local-orderflow-secret}
orderflow.security.token-ttl-seconds=${APP_JWT_TTL_SECONDS:86400}
orderflow.openai.api-key=${OPENAI_API_KEY:}
orderflow.openai.model=${ORDERFLOW_OPENAI_MODEL:gpt-4.1-mini}
orderflow.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
orderflow.openai.timeout-seconds=${OPENAI_TIMEOUT_SECONDS:60}
orderflow.openai.persist-api-key=${ORDERFLOW_OPENAI_PERSIST_API_KEY:false}
# OrderFlow MVP local run uses the direct OpenAI gateway and DB-backed agent registry.
# Disable legacy Spring AI auto-config that otherwise requires Gemini, Chroma, or MCP setup.
spring.autoconfigure.exclude=\
org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration,\
org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiEmbeddingConnectionAutoConfiguration,\
org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiTextEmbeddingAutoConfiguration,\
org.springframework.ai.vectorstore.chroma.autoconfigure.ChromaVectorStoreAutoConfiguration,\
org.springframework.ai.mcp.client.common.autoconfigure.StdioTransportAutoConfiguration,\
org.springframework.ai.mcp.client.common.autoconfigure.McpClientAutoConfiguration,\
org.springframework.ai.mcp.client.common.autoconfigure.McpToolCallbackAutoConfiguration,\
org.springframework.ai.mcp.client.common.autoconfigure.annotations.McpClientAnnotationScannerAutoConfiguration,\
org.springframework.ai.mcp.server.common.autoconfigure.McpServerAutoConfiguration,\
org.springframework.ai.mcp.server.common.autoconfigure.McpServerJsonMapperAutoConfiguration,\
org.springframework.ai.mcp.server.common.autoconfigure.ToolCallbackConverterAutoConfiguration,\
org.springframework.ai.mcp.server.common.autoconfigure.McpServerStatelessAutoConfiguration,\
org.springframework.ai.mcp.server.common.autoconfigure.StatelessToolCallbackConverterAutoConfiguration,\
org.springframework.ai.mcp.server.common.autoconfigure.annotations.McpServerSpecificationFactoryAutoConfiguration,\
org.springframework.ai.mcp.server.common.autoconfigure.annotations.StatelessServerSpecificationFactoryAutoConfiguration,\
org.springframework.ai.mcp.server.common.autoconfigure.annotations.McpServerAnnotationScannerAutoConfiguration,\
org.springframework.ai.mcp.server.webmvc.autoconfigure.McpServerSseWebMvcAutoConfiguration,\
org.springframework.ai.mcp.server.webmvc.autoconfigure.McpServerStreamableHttpWebMvcAutoConfiguration,\
org.springframework.ai.mcp.server.webmvc.autoconfigure.McpServerStatelessWebMvcAutoConfiguration
# rest client configuration
rest-client.base-url=http://localhost:8080
rest-client.token=${REST_CLIENT_TOKEN:}
rest-client.connect-timeout=10
rest-client.read-timeout=30
rest-client.max-retries=3
rest-client.retry-delay=2
dbdiagram.base-url=https://api.dbdiagram.io/v1
dbdiagram.token=${DBDIAGRAM_TOKEN:}
# bitbucket cloud configuration
bitbucket.base-url=https://api.bitbucket.org/2.0
bitbucket.username=${BITBUCKET_USERNAME:}
bitbucket.token=${BITBUCKET_TOKEN:}
## S3 Storage
s3-client.enabled=${S3_CLIENT_ENABLED:false}
s3-client.access-key-id=${S3_ACCESS_KEY_ID:}
s3-client.secret-access-key=${S3_SECRET_ACCESS_KEY:}
s3-client.region=us-east-1
s3-client.endpoint=http://minio.ezisolutions.vn:9099
s3-client.public-url=https://minio.ezisolutions.vn/storage
s3-client.bucket=storage
