spring.application.name=eziops-api-gw
spring.main.allow-bean-definition-overriding=true
spring.data.redis.repositories.enabled=false
app._private.token=${APP_PRIVATE_TOKEN}
# debug
logging.level.org.springframework.web.server=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web.server=TRACE
# id system
id-system.base-url=http://id-system:8080/api/v1/private/
id-system.token=${APP_PRIVATE_TOKEN}
# postgresql
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
orderflow.security.jwt-secret=${APP_JWT_SECRET:change-me-local-orderflow-secret}
orderflow.security.token-ttl-seconds=${APP_JWT_TTL_SECONDS:86400}
orderflow.openai.api-key=${OPENAI_API_KEY:}
orderflow.openai.model=${ORDERFLOW_OPENAI_MODEL:gpt-4.1-mini}
orderflow.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
orderflow.openai.timeout-seconds=${OPENAI_TIMEOUT_SECONDS:60}
# ai core
ai-core.quota-cooldown-minutes=30
# google genai embedding
spring.ai.google.genai.embedding.vertex-ai=false
spring.ai.google.genai.embedding.project-id=local
spring.ai.google.genai.embedding.location=global
spring.ai.google.genai.embedding.text.options.model=gemini-embedding-001
# vector store
spring.ai.vectorstore.chroma.tenant-name=core_ai
spring.ai.vectorstore.chroma.database-name=recruitment_db
spring.ai.vectorstore.chroma.collection-name=recruitment_jd
spring.ai.vectorstore.chroma.initialize-schema=true

# rest client configuration
rest-client.base-url=http://localhost:8080
rest-client.token=${REST_CLIENT_TOKEN:}
rest-client.connect-timeout=10
rest-client.read-timeout=30
rest-client.max-retries=3
rest-client.retry-delay=2
